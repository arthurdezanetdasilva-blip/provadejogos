<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo Genius</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topo">

<h1>Jogo <span>Genius</span></h1>

<select id="modo">
<option value="facil">🟢 Fácil</option>
<option value="medio" selected>🟡 Médio</option>
<option value="dificil">🔴 Difícil</option>
</select>

<button id="start">▶ Iniciar Jogo</button>

</header>

<main class="container">

<section class="left">

<div class="board">

<div class="btn green"></div>
<div class="btn red"></div>
<div class="btn yellow"></div>
<div class="btn blue"></div>

<div class="center">GENIUS</div>

</div>

<div class="info" id="msg">
Clique em iniciar para jogar
</div>

</section>

<section class="right">

<div class="card">
<h2>PLACAR</h2>
<p>Rodada: <span id="round">0</span></p>
<p>Recorde: <span id="best">0</span></p>
</div>

<div class="card">
<h2>🏆 RANKING</h2>

<div id="ranking">
<p>1º ---</p>
<p>2º ---</p>
<p>3º ---</p>
<p>4º ---</p>
<p>5º ---</p>
</div>

<button id="resetRank" class="btn-rank">
🗑 Limpar Ranking
</button>

</div>

<div class="card">
<h2>COMO JOGAR</h2>
<p>Observe a sequência</p>
<p>Repita clicando nas cores</p>
<p>A cada rodada aumenta</p>
<p>Errou = Game Over</p>
</div>

</section>

</main>

<script src="script.js"></script>
</body>
</html>
